<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="This website hosts a memory game created to show off my skills in HTML, CSS, & Java Script."
    />

    <title>Memory Game!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Metal+Mania&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <div id="banner">
    <img src="audionerds-logo.png" alt="Audionerds Logo" />
    <p>Created by Audionerds</p>
  </div>
  <body>
    <h1>
      <span>&#9760;&#9760;&#9760;</span>Memory Game<span
        >&#9760;&#9760;&#9760;</span
      >
    </h1>

    <div class="grid-container"></div>

    <p>Score: <span class="score"></span></p>

    <p>Stopwatch:</p>
    <p id="stopwatch">0</p>

    <div class="actions">
      <button onclick="restart()">Restart</button>
    </div>

    <p>Lowest Scores: <span class="lowest-scores"></span></p>
    <div id="lowest-scores">
      <p class="score">Score 1</p>
      <p class="score">Score 2</p>
      <p class="score">Score 3</p>
    </div>

    <script src="app.js?v=1.0.0"></script>
  </body>
</html>
