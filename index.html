<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memory Game!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Metal+Mania&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>&#9760;&#9760;&#9760; Memory Game &#9760;&#9760;&#9760;</h1>

    <div class="grid-container"></div>

    <p>Score: <span class="score"></span></p>

    <p id="stopwatch">Stopwatch: 0</p>

    <div class="actions">
      <button onclick="restart()">Restart</button>
    </div>

    <p>Lowest Scores: <span class="lowest-scores"></span></p>
    <div id="lowest-scores">
      <p class="score">Score 1</p>
      <p class="score">Score 2</p>
      <p class="score">Score 3</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
